name: Build ImmortalWrt with Daede

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 初始化环境
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils kpartx dosfstools xz-utils wget

      - name: 下载 ImmortalWrt 固件
        run: |
          mkdir -p build && cd build
          BASE_URL="https://downloads.immortalwrt.org/releases/24.10.6/targets/x86/64"

          echo "📥 下载固件..."
          wget -q --show-progress "$BASE_URL/immortalwrt-24.10.6-x86-64-generic-ext4-combined.img.gz" -O firmware.img.gz

          echo "📥 下载校验文件..."
          wget -q "$BASE_URL/sha256sums" -O sha256sums.txt

          echo "🔍 校验 SHA256..."
          grep "generic-ext4-combined.img.gz" sha256sums.txt | sha256sum -c || echo "⚠️ 校验失败但继续"

          # ===== 关键修复1: 忽略 gunzip 对尾部垃圾数据的警告（退出码2）=====
          echo "📦 解压固件..."
          set +e
          gunzip -k firmware.img.gz 2>gunzip_err.log
          GUNZIP_EXIT=$?
          set -e

          if [ $GUNZIP_EXIT -ne 0 ] && [ $GUNZIP_EXIT -ne 2 ]; then
            echo "❌ 解压失败，退出码: $GUNZIP_EXIT"
            cat gunzip_err.log
            exit 1
          fi

          if [ ! -f firmware.img ]; then
            echo "❌ 解压后找不到 firmware.img"
            exit 1
          fi

          echo "✅ 固件解压完成（gunzip 警告已忽略，退出码=$GUNZIP_EXIT）"

      - name: 扩容 rootfs 分区
        run: |
          cd build
          echo "📏 扩容固件（+512MB）..."
          qemu-img resize firmware.img +512M

          OFFSET=$(fdisk -l firmware.img | grep firmware.img2 | awk '{print $2}')
          SECT_SIZE=$(fdisk -l firmware.img | grep "Sector size" | awk '{print $4}')
          OFFSET_BYTES=$((OFFSET * SECT_SIZE))

          echo "  分区2起始偏移: $OFFSET 扇区 = $OFFSET_BYTES 字节"

          sudo losetup -o $OFFSET_BYTES /dev/loop0 firmware.img
          sudo e2fsck -fy /dev/loop0 || true
          sudo resize2fs /dev/loop0
          sudo losetup -d /dev/loop0
          echo "✅ 分区扩容完成"

      - name: 挂载并定制固件
        run: |
          cd build

          OFFSET=$(fdisk -l firmware.img | grep firmware.img2 | awk '{print $2}')
          SECT_SIZE=$(fdisk -l firmware.img | grep "Sector size" | awk '{print $4}')
          OFFSET_BYTES=$((OFFSET * SECT_SIZE))

          sudo mkdir -p /mnt/rootfs
          sudo mount -o loop,offset=$OFFSET_BYTES firmware.img /mnt/rootfs

          echo "📊 扩容后 rootfs 空间："
          df -h /mnt/rootfs

          # ===== 关键修复2: resolv.conf 悬空软链接 =====
          echo "🔧 修复 /etc/resolv.conf 悬空软链接..."
          if [ -L /mnt/rootfs/etc/resolv.conf ]; then
            echo "  检测到悬空软链接: $(ls -la /mnt/rootfs/etc/resolv.conf)"
            sudo rm -f /mnt/rootfs/etc/resolv.conf
            echo "  已删除悬空软链接"
          fi

          # 创建 /tmp/resolv.conf.d 目录（软链接指向的目标）
          sudo mkdir -p /mnt/rootfs/tmp/resolv.conf.d
          echo "# placeholder" | sudo tee /mnt/rootfs/tmp/resolv.conf.d/resolv.conf.auto

          # 写入实际 DNS 配置
          echo "nameserver 223.5.5.5" | sudo tee /mnt/rootfs/etc/resolv.conf
          echo "nameserver 119.29.29.29" | sudo tee -a /mnt/rootfs/etc/resolv.conf
          echo "✅ DNS 配置完成"

          # ---- chroot 安装 daede ----
          echo "🔧 配置 chroot 环境..."
          sudo mount -t proc proc /mnt/rootfs/proc
          sudo mount -t sysfs sysfs /mnt/rootfs/sys
          sudo mount -o bind /dev /mnt/rootfs/dev
          sudo mount -o bind /dev/pts /mnt/rootfs/dev/pts

          # 复制宿主机 DNS 到 chroot 内
          sudo cp /etc/resolv.conf /mnt/rootfs/etc/resolv.conf

          echo "📦 安装 daede（dae + daed + luci-app-daede）..."

          sudo chroot /mnt/rootfs /bin/ash << 'CHROOT_EOF'
          set -e

          # 先更新 opkg
          echo "🔄 更新 opkg..."
          opkg update || true

          # 安装基础依赖
          echo "📦 安装依赖..."
          opkg install ca-bundle curl wget || true

          # ===== 使用 kenzok8/openwrt-daede 一键安装脚本 =====
          echo "📥 下载并执行 daede 安装脚本..."
          cd /tmp

          # 尝试直接下载（GitHub raw）
          wget -q -O install.sh \
            "https://raw.githubusercontent.com/kenzok8/openwrt-daede/refs/heads/main/scripts/install.sh" \
            || wget --no-check-certificate -q -O install.sh \
            "https://ghfast.top/https://raw.githubusercontent.com/kenzok8/openwrt-daede/refs/heads/main/scripts/install.sh"

          if [ -f install.sh ]; then
            echo "✅ 安装脚本下载成功，开始安装..."
            chmod +x install.sh
            ash install.sh || {
              echo "⚠️ 一键安装脚本失败，尝试备用方式..."

              # 备用方案：使用 feed 源方式
              wget -qO- "https://down.dllkids.xyz/openwrt-feed/openwrt-feed-setup.sh" | sh || true
              opkg update --allow-untrusted || true
              opkg install dae daed luci-app-daede --force-depends || true
            }
          else
            echo "⚠️ 无法下载安装脚本，尝试 feed 源方式..."
            wget -qO- "https://down.dllkids.xyz/openwrt-feed/openwrt-feed-setup.sh" | sh || true
            opkg update --allow-untrusted || true
            opkg install dae daed luci-app-daede --force-depends || true
          fi

          # 验证安装
          echo ""
          echo "🔍 验证安装结果..."
          echo "---"
          which dae 2>/dev/null && echo "✅ dae 已安装: $(dae version 2>/dev/null || echo 'ok')" || echo "⚠️ dae 未找到"
          which daed 2>/dev/null && echo "✅ daed 已安装" || echo "⚠️ daed 未找到（如只装 dae 可忽略）"
          ls /usr/lib/lua/luci/controller/daede.lua 2>/dev/null && echo "✅ luci-app-daede 已安装" || echo "⚠️ luci-app-daede 未找到"
          echo "---"
          echo "✅ daede 安装流程完成"
          CHROOT_EOF

          # ---- 卸载 chroot ----
          echo "🧹 清理 chroot 挂载..."
          sudo umount /mnt/rootfs/dev/pts 2>/dev/null || true
          sudo umount /mnt/rootfs/dev 2>/dev/null || true
          sudo umount /mnt/rootfs/proc 2>/dev/null || true
          sudo umount /mnt/rootfs/sys 2>/dev/null || true

          # ---- 恢复 resolv.conf ----
          echo "🧹 恢复 /etc/resolv.conf 软链接..."
          sudo rm -f /mnt/rootfs/etc/resolv.conf
          sudo ln -sf /tmp/resolv.conf.d/resolv.conf.auto /mnt/rootfs/etc/resolv.conf || true

          # 卸载
          sudo umount /mnt/rootfs
          echo "✅ 定制完成"

      - name: 压缩并输出固件
        run: |
          cd build
          echo "📦 压缩固件..."
          gzip -c firmware.img > immortalwrt-x86-64-daede.img.gz

          sha256sum immortalwrt-x86-64-daede.img.gz > immortalwrt-x86-64-daede.img.gz.sha256

          echo "📊 最终固件："
          ls -lh immortalwrt-x86-64-daede.img.gz

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-x86-64-Daede
          path: |
            build/immortalwrt-x86-64-daede.img.gz
            build/immortalwrt-x86-64-daede.img.gz.sha256
          retention-days: 30
