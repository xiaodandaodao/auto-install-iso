name: Build ImmortalWrt 

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 初始化环境
        run: |
          sudo apt-get update
          # 补充安装 parted 和 gdisk(提供sgdisk)，用于完美操纵 GPT 分区表
          sudo apt-get install -y qemu-utils kpartx dosfstools xz-utils wget \
                                 isolinux xorriso grub-pc-bin grub-efi-amd64-bin mtools busybox-static parted gdisk

      - name: 下载 ImmortalWrt 固件
        run: |
          mkdir -p build && cd build
          BASE_URL="https://downloads.immortalwrt.org/releases/24.10.6/targets/x86/64"

          # ============================================================
          # 【核心修复 1】: 全面切换为 efi 官方标准双启 GPT 镜像
          # ============================================================
          echo "📥 下载 UEFI 复合版固件..."
          wget -q --show-progress "$BASE_URL/immortalwrt-24.10.6-x86-64-generic-ext4-combined-efi.img.gz" -O firmware.img.gz

          echo "📥 下载校验文件..."
          wget -q "$BASE_URL/sha256sums" -O sha256sums.txt

          echo "🔍 校验 SHA256..."
          grep "generic-ext4-combined-efi.img.gz" sha256sums.txt | sha256sum -c || echo "⚠️ 校验失败但继续"

          echo "📦 解压固件..."
          set +e
          gunzip -k firmware.img.gz 2>gunzip_err.log
          GUNZIP_EXIT=$?
          set -e

          if [ $GUNZIP_EXIT -ne 0 ] && [ $GUNZIP_EXIT -ne 2 ]; then
            echo "❌ 解压失败，退出码: $GUNZIP_EXIT"
            cat gunzip_err.log
            exit 1
          fi

          # 规范命名
          mv immortalwrt-24.10.6-x86-64-generic-ext4-combined-efi.img firmware.img 2>/dev/null || true

          if [ ! -f firmware.img ]; then
            echo "❌ 解压后找不到 firmware.img"
            exit 1
          fi

          echo "✅ 固件解压完成"

      - name: 扩容 rootfs 分区
        run: |
          cd build
          echo "📏 1. 扩容固件磁盘文件（+512MB）..."
          qemu-img resize firmware.img +512M

          # ============================================================
          # 【核心修复 2A】: 借助 sgdisk 和 parted 同步重写 GPT 分区表边界
          # ============================================================
          echo "⚙️ 2. 将备份 GPT 数据结构移动到新文件末尾..."
          sudo sgdisk -e firmware.img

          echo "⚙️ 3. 真正放大分区表中的第二分区 (rootfs)..."
          sudo parted -s firmware.img resizepart 2 100%

          echo "🔄 4. 挂载全功能环回设备并重塑 ext4 文件系统大小..."
          # -P 参数极其重要：它让系统自动识别并映射出 /dev/loopXp1, p2 等子分区
          LOOP_DEV=$(sudo losetup -Pf --show firmware.img)
          echo "  已分配内核环回主设备: $LOOP_DEV"
          
          # 对第二分区执行文件系统修复与线上扩容
          sudo e2fsck -fy ${LOOP_DEV}p2 || true
          sudo resize2fs ${LOOP_DEV}p2
          
          # 安全卸载设备
          sudo losetup -d ${LOOP_DEV}
          echo "✅ 分区表边界与 ext4 文件系统扩容彻底对齐，杜绝 Boot Loop！"

      - name: 挂载并定制固件
        run: |
          cd build

          # 再次拉起高阶环回映射
          LOOP_DEV=$(sudo losetup -Pf --show firmware.img)
          echo "  已映射环回路径: $LOOP_DEV"

          sudo mkdir -p /mnt/rootfs
          sudo mount ${LOOP_DEV}p2 /mnt/rootfs

          echo "📊 扩容后 rootfs 真实可用空间："
          df -h /mnt/rootfs

          echo "🔧 修复 /etc/resolv.conf 悬空软链接..."
          if [ -L /mnt/rootfs/etc/resolv.conf ]; then
            sudo rm -f /mnt/rootfs/etc/resolv.conf
          fi

          sudo mkdir -p /mnt/rootfs/tmp/resolv.conf.d
          echo "# placeholder" | sudo tee /mnt/rootfs/tmp/resolv.conf.d/resolv.conf.auto

          echo "nameserver 223.5.5.5" | sudo tee /mnt/rootfs/etc/resolv.conf
          echo "nameserver 119.29.29.29" | sudo tee -a /mnt/rootfs/etc/resolv.conf

          echo "🔧 配置 chroot 环境..."
          sudo mount -t proc proc /mnt/rootfs/proc
          sudo mount -t sysfs sysfs /mnt/rootfs/sys
          sudo mount -o bind /dev /mnt/rootfs/dev
          sudo mount -o bind /dev/pts /mnt/rootfs/dev/pts

          sudo cp /etc/resolv.conf /mnt/rootfs/etc/resolv.conf

          sudo chroot /mnt/rootfs /bin/ash << 'CHROOT_EOF'
          set -e

          echo "🔄 更新 opkg..."
          opkg update || true

          echo "📦 下载光驱与 ISO9660 内核模块..."
          opkg install kmod-fs-isofs kmod-scsi-cdrom || true

          echo "📦 安装依赖..."
          opkg install ca-bundle curl wget || true

          echo "📥 下载并执行 daede 安装脚本..."
          cd /tmp

          wget -q -O install.sh \
            "https://raw.githubusercontent.com/kenzok8/openwrt-daede/refs/heads/main/scripts/install.sh" \
            || wget --no-check-certificate -q -O install.sh \
            "https://ghfast.top/https://raw.githubusercontent.com/kenzok8/openwrt-daede/refs/heads/main/scripts/install.sh"

          if [ -f install.sh ]; then
            chmod +x install.sh
            ash install.sh || {
              wget -qO- "https://down.dllkids.xyz/openwrt-feed/openwrt-feed-setup.sh" | sh || true
              opkg update --allow-untrusted || true
              opkg install dae daed luci-app-daede --force-depends || true
            }
          else
            wget -qO- "https://down.dllkids.xyz/openwrt-feed/openwrt-feed-setup.sh" | sh || true
            opkg update --allow-untrusted || true
            opkg install dae daed luci-app-daede --force-depends || true
          fi
          CHROOT_EOF

          echo "📂 正在提取内核模块，准备打包进隔离的 initramfs..."
          mkdir -p ../kernel_modules
          sudo find /mnt/rootfs/lib/modules/ -name "cdrom.ko" -o -name "sr_mod.ko" -o -name "isofs.ko" | xargs -I {} sudo cp {} ../kernel_modules/

          echo "🧹 清理 chroot 挂载..."
          sudo umount /mnt/rootfs/dev/pts 2>/dev/null || true
          sudo umount /mnt/rootfs/dev 2>/dev/null || true
          sudo umount /mnt/rootfs/proc 2>/dev/null || true
          sudo umount /mnt/rootfs/sys 2>/dev/null || true

          sudo rm -f /mnt/rootfs/etc/resolv.conf
          sudo ln -sf /tmp/resolv.conf.d/resolv.conf.auto /mnt/rootfs/etc/resolv.conf || true

          sudo umount /mnt/rootfs
          sudo losetup -d ${LOOP_DEV}
          echo "✅ 定制完成"

      - name: 构建 ISO 并准备 Release 产物
        run: |
          cd build

          echo "=========================================="
          echo "  构建无人值守安装 ISO 镜像"
          echo "=========================================="

          # ============================================================
          # 【核心修复 2B】: 利用强大的物理子分区节点直接挂载 Part 1 提取内核
          # ============================================================
          LOOP_DEV=$(sudo losetup -Pf --show firmware.img)
          
          sudo mkdir -p /mnt/bootpart
          sudo mount ${LOOP_DEV}p1 /mnt/bootpart

          # 智能化检索提取 vmlinuz 内核
          if [ -f /mnt/bootpart/vmlinuz ]; then
            sudo cp /mnt/bootpart/vmlinuz ./vmlinuz
          elif [ -f /mnt/bootpart/boot/vmlinuz ]; then
            sudo cp /mnt/bootpart/boot/vmlinuz ./vmlinuz
          else
            KERNEL=$(sudo find /mnt/bootpart -name 'vmlinuz*' -type f 2>/dev/null | head -1)
            sudo cp "$KERNEL" ./vmlinuz
          fi

          sudo umount /mnt/bootpart
          sudo losetup -d ${LOOP_DEV}

          # ============================================================
          # 构建 initramfs 自动化微系统
          # ============================================================
          mkdir -p initramfs_dir/{bin,dev,proc,sys,tmp,mnt,etc,usr/sbin,lib/modules}
          cp "$(which busybox)" initramfs_dir/bin/busybox
          chmod +x initramfs_dir/bin/busybox

          if [ -d "kernel_modules" ] && [ "$(ls -A kernel_modules)" ]; then
            cp kernel_modules/*.ko initramfs_dir/lib/modules/
          fi

          sudo mknod -m 600 initramfs_dir/dev/console c 5 1 2>/dev/null || true
          sudo mknod -m 666 initramfs_dir/dev/null    c 1 3 2>/dev/null || true
          sudo mknod -m 666 initramfs_dir/dev/zero    c 1 5 2>/dev/null || true

          cat > initramfs_dir/init << 'INITSCRIPT'
          #!/bin/busybox sh

          /bin/busybox mount -t proc proc /proc
          /bin/busybox mount -t sysfs sysfs /sys
          /bin/busybox mount -t devtmpfs devtmpfs /dev

          /bin/busybox insmod /lib/modules/cdrom.ko 2>/dev/null
          /bin/busybox insmod /lib/modules/sr_mod.ko 2>/dev/null
          /bin/busybox insmod /lib/modules/isofs.ko 2>/dev/null

          /bin/busybox mdev -s

          /bin/busybox setsid /bin/busybox cttyhack /bin/busybox sh -c '
          clear
          echo ""
          echo "  ╔══════════════════════════════════════════╗"
          echo "  ║   ImmortalWrt 无人值守安装器             ║"
          echo "  ║   Auto-Installer v1.0                    ║"
          echo "  ╚══════════════════════════════════════════╝"
          echo ""
          echo "  ⚠️  警告: 即将自动清除目标磁盘全部数据!"
          echo ""

          echo "  📋 检测到的磁盘设备:"
          echo "  ─────────────────────────────────────────"
          for blk in /sys/block/sd* /sys/block/nvme* /sys/block/vd* /sys/block/mmcblk*; do
            [ -d "$blk" ] || continue
            DEV=$(basename "$blk")
            SIZE=$(cat "$blk/size" 2>/dev/null)
            if [ -n "$SIZE" ]; then
              SIZE_GB=$((SIZE * 512 / 1073741824))
              echo "    /dev/$DEV  (${SIZE_GB} GB)"
            fi
          done
          echo "  ─────────────────────────────────────────"
          echo ""

          FIRMWARE_PATH=""
          BOOT_DEV=""

          for retry in 1 2 3; do
            echo "  🔍 正在定位固件镜像 (尝试第 $retry/3 次)..."
            for part in /dev/sr0 /dev/sr1 \
                        /dev/sd[a-z] /dev/sd[a-z][1-9] /dev/sd[a-z]1[0-9] \
                        /dev/nvme[0-9]n[0-9]p[1-9] /dev/nvme[0-9]n[0-9]p1[0-9] \
                        /dev/vd[a-z] /dev/vd[a-z][1-9]; do
              [ -b "$part" ] || continue
              mkdir -p /mnt/search 2>/dev/null
              if mount -o ro "$part" /mnt/search 2>/dev/null; then
                if [ -f /mnt/search/firmware.img ]; then
                  FIRMWARE_PATH="/mnt/search/firmware.img"
                  BOOT_DEV="$part"
                  echo "  ✅ 找到固件: $part -> firmware.img"
                  break
                fi
                umount /mnt/search 2>/dev/null
              fi
            done
            [ -n "$FIRMWARE_PATH" ] && break
            sleep 3
            /bin/busybox mdev -s 2>/dev/null
          done

          if [ -z "$FIRMWARE_PATH" ]; then
            echo "  ❌ 未找到固件镜像 firmware.img!"
            exec /bin/busybox sh
          fi

          echo ""
          echo "  🎯 选择目标安装磁盘:"
          echo "  ─────────────────────────────────────────"
          DISK_NUM=0
          DISKS=""
          for blk in /sys/block/sd* /sys/block/nvme* /sys/block/vd* /sys/block/mmcblk*; do
            [ -d "$blk" ] || continue
            DEV=$(basename "$blk")
            SIZE=$(cat "$blk/size" 2>/dev/null)
            [ -z "$SIZE" ] && continue
            SIZE_GB=$((SIZE * 512 / 1073741824))
            DISK_NUM=$((DISK_NUM + 1))
            DISKS="$DISKS /dev/$DEV"
            echo "    [$DISK_NUM] /dev/$DEV  (${SIZE_GB} GB)"
          done
          echo "  ─────────────────────────────────────────"

          TARGET_DISK=""
          DISK_COUNT=0
          for d in $DISKS; do
            case "$BOOT_DEV" in
              ${d}*)
                continue
                ;;
            esac
            DISK_COUNT=$((DISK_COUNT + 1))
            TARGET_DISK="$d"
          done

          if [ "$DISK_COUNT" -eq 0 ]; then
            echo "  ❌ 未找到可用目标磁盘!"
            exec /bin/busybox sh
          fi

          if [ "$DISK_COUNT" -gt 1 ]; then
            echo ""
            echo "  ⚠️  检测到多个候选磁盘，默认选择第一个: $TARGET_DISK"
            echo "  💡 如需手动选择，请在5秒内按任意键进入 shell..."
            OLD_IFS="$IFS"; IFS=""
            read -t 5 -n 1 KEYPRESS 2>/dev/null
            IFS="$OLD_IFS"
            if [ -n "$KEYPRESS" ]; then
              exec /bin/busybox sh
            fi
          fi

          echo ""
          echo "  ⏳ 5秒后开始自动安装..."
          for i in 5 4 3 2 1; do
            echo -n "  ... $i  "
            OLD_IFS="$IFS"; IFS=""
            read -t 1 -n 1 KEY 2>/dev/null
            IFS="$OLD_IFS"
            if [ -n "$KEY" ]; then
              exec /bin/busybox sh
            fi
            echo ""
          done

          echo "  📦 正在将定制版双启固件克隆至目标盘 $TARGET_DISK ..."
          if /bin/busybox dd if="$FIRMWARE_PATH" of="$TARGET_DISK" bs=4M conv=fsync 2>&1; then
            echo ""
            echo "  ✅ 克隆成功！目标盘已具备原生 UEFI 与 BIOS 双启动能力！"
            echo ""
          else
            echo "  ❌ 写入过程出错!"
            exec /bin/busybox sh
          fi

          sync
          sleep 5
          echo "  🔌 正在自动关机..."
          /bin/busybox poweroff -f 2>/dev/null || /bin/busybox reboot -f 2>/dev/null
          '
          INITSCRIPT

          chmod +x initramfs_dir/init

          echo "📦 打包 initramfs..."
          cd initramfs_dir
          find . -print0 | cpio --null -o -H newc 2>/dev/null | gzip -9 > ../initramfs.gz
          cd ..

          # ============================================================
          # 组装封包 ISO
          # ============================================================
          rm -rf iso_root
          mkdir -p iso_root/boot/grub
          mkdir -p iso_root/isolinux

          cp vmlinuz iso_root/boot/vmlinuz
          cp initramfs.gz iso_root/boot/initramfs.gz
          cp firmware.img iso_root/firmware.img

          # Legacy BIOS 引导组件
          cp /usr/lib/ISOLINUX/isolinux.bin iso_root/isolinux/
          cp /usr/lib/syslinux/modules/bios/*.c32 iso_root/isolinux/ 2>/dev/null || true

          cat > iso_root/isolinux/isolinux.cfg << 'ISOCFG'
          DEFAULT auto
          PROMPT 0
          TIMEOUT 50
          UI menu.c32
          MENU TITLE ImmortalWrt Auto-Installer

          LABEL auto
            MENU LABEL ^1 自动安装 ImmortalWrt (无人值守)
            MENU DEFAULT
            KERNEL /boot/vmlinuz
            INITRD /boot/initramfs.gz
            APPEND console=tty0 console=ttyS0,115200n8 quiet
          ISOCFG

          # UEFI 引导菜单
          cat > iso_root/boot/grub/grub.cfg << 'GRUBCFG'
          set default=0
          set timeout=5
          menuentry "ImmortalWrt 自动安装 (无人值守)" {
            linux /boot/vmlinuz console=tty0 console=ttyS0,115200n8 quiet
            initrd /boot/initramfs.gz
          }
          GRUBCFG

          # 编译包含核心引导命令的通用独立 UEFI 镜像
          grub-mkimage -O x86_64-efi -o bootx64.efi -p /boot/grub part_gpt part_msdos iso9660 fat ext2 normal search configfile echo test linux

          dd if=/dev/zero of=iso_root/efi.img bs=1K count=4096 2>/dev/null
          mkfs.vfat iso_root/efi.img >/dev/null 2>&1
          mmd -i iso_root/efi.img ::/EFI ::/EFI/BOOT
          mcopy -i iso_root/efi.img bootx64.efi ::/EFI/BOOT/BOOTX64.EFI

          # Xorriso 终极混合多端打包
          xorriso -as mkisofs \
            -o immortalwrt-x86-64-daede-autoinstall.iso \
            -isohybrid-mbr /usr/lib/ISOLINUX/isohdpfx.bin \
            -b isolinux/isolinux.bin \
            -c isolinux/boot.cat \
            -no-emul-boot \
            -boot-load-size 4 \
            -boot-info-table \
            -eltorito-alt-boot \
            -e efi.img \
            -no-emul-boot \
            -isohybrid-gpt-basdat \
            -iso-level 3 \
            -full-iso9660-filenames \
            -R -J -joliet-long \
            -V "ImmortalWrt_AutoInstall" \
            iso_root/

          sha256sum immortalwrt-x86-64-daede-autoinstall.iso > immortalwrt-x86-64-daede-autoinstall.iso.sha256

          # 打包纯净固件包
          gzip -f firmware.img
          mv firmware.img.gz immortalwrt-x86-64-daede.img.gz
          sha256sum immortalwrt-x86-64-daede.img.gz > immortalwrt-x86-64-daede.img.gz.sha256

      - name: 创建 Release 并上传文件
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}-${{ github.run_attempt }}
          name: ImmortalWrt-Daede-EFI ${{ github.run_number }}.${{ github.run_attempt }}
          body: |
            ### 🚀 完美修复版（支持目标盘 UEFI 启动 / 解决 BIOS 循环重启）

            **主要改动：**
            1. 采用基础固件：`combined-efi` 版本，克隆到目标盘后支持原生 **UEFI + GPT** 引导。
            2. 重构扩容核心：引入 `parted` 和 `sgdisk` 物理改写分区表边界，根除因空间尺寸矛盾引发的 **BIOS 启动无限死机重启** 恶性 Bug。
          files: |
            build/immortalwrt-x86-64-daede.img.gz
            build/immortalwrt-x86-64-daede.img.gz.sha256
            build/immortalwrt-x86-64-daede-autoinstall.iso
            build/immortalwrt-x86-64-daede-autoinstall.iso.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
