name: Build ImmortalWrt Unattended ISO via Image Builder

on:
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          # 在末尾补充了 genisoimage 和 syslinux，彻底满足官方底层生成 ISO 的环境要求
          sudo apt-get install -y zstd gawk gettext xz-utils xsltproc qemu-utils \
            grub-pc-bin grub-efi-amd64-bin xorriso mtools libisoburn1 busybox-static cpio \
            genisoimage syslinux
            
      - name: Download and Extract Image Builder
        run: |
          wget https://downloads.immortalwrt.org/releases/24.10.6/targets/x86/64/immortalwrt-imagebuilder-24.10.6-x86-64.Linux-x86_64.tar.zst
          tar -I zstd -xf immortalwrt-imagebuilder-24.10.6-x86-64.Linux-x86_64.tar.zst
          mv immortalwrt-imagebuilder-24.10.6-x86-64.Linux-x86_64 imagebuilder

      - name: Configure Image Builder (Feeds, Signature, PartSize, and Dae Bypass)
        run: |
          cd imagebuilder
          # 1. 屏蔽签名验证
          sed -i 's/option check_signature/# option check_signature/g' repositories.conf
          
          # 2. 注入第三方源
          echo "src/gz dllkids_packages https://down.dllkids.xyz/openwrt-feed/x86_64" >> repositories.conf
          
          # 3. 锁定 Rootfs 分区为 512MB
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=512" >> .config

          # 4. 创建离线包目录与脚本
          mkdir -p files/root/pkgs
          mkdir -p files/etc/uci-defaults

          FEED_URL="https://down.dllkids.xyz/openwrt-feed/x86_64"
          curl -s "${FEED_URL}/Packages" > temp_packages
          for pkg in dae daed luci-app-daede; do
            IPK_PATH=$(grep -A 10 "Package: ${pkg}$" temp_packages | grep "Filename:" | awk '{print $2}')
            if [ ! -z "$IPK_PATH" ]; then
              wget -P files/root/pkgs "${FEED_URL}/${IPK_PATH}"
            fi
          done
          rm temp_packages

          cat << 'EOF' > files/etc/uci-defaults/99-install-dae
          #!/bin/sh
          if [ -d /root/pkgs ]; then
              logger -t "INSTALLER" "Starting offline installation for DAE/DAED..."
              opkg install /root/pkgs/*.ipk --force-depends
              rm -rf /root/pkgs
          fi
          exit 0
          EOF
          chmod +x files/etc/uci-defaults/99-install-dae
          
      - name: Build Firmware Image
        run: |
          cd imagebuilder
          # 1. PACKAGES 剔除了 dae 核心包，顺便修复了之前 dnsmasq-full 重复声明的小语法隐患
          # 2. 显式补全了 dae 运行所需的底层核心依赖（kmod-nft-tproxy, ip-full）
          # 3. 末尾追加 FILES=files 将上一步下载的包和脚本打包进 ISO
          make image PROFILE=generic \
            PACKAGES="luci-app-openclash sqm-scripts luci-app-sqm -dnsmasq -dnsmasq-dhcpv6 dnsmasq-full bash curl ca-bundle coreutils-nohup libcap-bin kmod-nft-tproxy ip-full" \
            CONFIG_TARGET_ROOTFS_PARTSIZE=512 \
            FILES=files
            
      - name: Extract Firmware and Kernel
        run: |
          IMAGE_PATH=$(ls imagebuilder/bin/targets/x86/64/*combined-efi.img.gz | head -n 1)
          echo "Target image found: $IMAGE_PATH"
          
          # 【核心修正】：用 || true 忽略 gunzip 针对分区填充数据产生的“假报错”(Exit Code 2)
          gunzip -c "$IMAGE_PATH" > openwrt.img || true
          
          # 增加一道防线：确保解压出来的固件文件存在，且体积不为 0
          if [ ! -s openwrt.img ]; then
            echo "Error: Firmware extraction failed!"
            exit 1
          fi
          echo "Firmware successfully extracted."
          
          if [ -f imagebuilder/bin/targets/x86/64/vmlinuz ]; then
            cp imagebuilder/bin/targets/x86/64/vmlinuz kernel.bin
          else
            cp imagebuilder/bin/targets/x86/64/*-generic-kernel.bin kernel.bin
          fi
          
      - name: Extract Kernel Modules from Firmware Image
        run: |
          sudo losetup -P /dev/loop0 openwrt.img
          sleep 1
          mkdir -p mnt
          # 挂载第二个分区（通常是 rootfs）
          sudo mount /dev/loop0p2 mnt
          KERNEL_VERSION=$(ls mnt/lib/modules/ | head -n 1)
          echo "KERNEL_VERSION=$KERNEL_VERSION" >> $GITHUB_ENV
          mkdir -p initrd_modules
          for mod in cdrom sr_mod isofs nls_base nls_iso8859-1 nls_cp437 ; do
            # 查找模块文件，可能是 .ko 或 .ko.gz
            file=$(sudo find mnt/lib/modules/$KERNEL_VERSION -name "${mod}.ko*" | head -n 1)
            if [ -n "$file" ]; then
              if echo "$file" | grep -q '\.ko\.gz$'; then
                sudo zcat "$file" > initrd_modules/${mod}.ko
              elif echo "$file" | grep -q '\.ko$'; then
                sudo cp "$file" initrd_modules/
              fi
            fi
          done
          sudo umount mnt
          sudo losetup -d /dev/loop0

      - name: Extract Kernel Modules from Firmware Image
        run: |
          sudo losetup -P /dev/loop0 openwrt.img
          sleep 1
          mkdir -p mnt
          sudo mount /dev/loop0p2 mnt
          KERNEL_VERSION=$(ls mnt/lib/modules/ | head -n 1)
          echo "KERNEL_VERSION=$KERNEL_VERSION" >> $GITHUB_ENV
          mkdir -p initrd_modules
          for mod in cdrom sr_mod isofs nls_base nls_iso8859-1 nls_cp437; do
            file=$(sudo find mnt/lib/modules/$KERNEL_VERSION -name "${mod}.ko*" | head -n 1)
            if [ -n "$file" ]; then
              if echo "$file" | grep -q '\.ko\.gz$'; then
                sudo zcat "$file" > initrd_modules/${mod}.ko
              elif echo "$file" | grep -q '\.ko$'; then
                sudo cp "$file" initrd_modules/
              fi
            fi
          done
          sudo umount mnt
          sudo losetup -d /dev/loop0    
          
      - name: Create Custom Initramfs (Installer)
        run: |
          mkdir -p initrd_root/bin initrd_root/sbin initrd_root/etc initrd_root/dev \
                   initrd_root/proc initrd_root/sys initrd_root/mnt initrd_root/mnt_test
          
          # 创建模块目录并复制提取的模块（如果上一步成功提取）
          mkdir -p initrd_root/lib/modules/${KERNEL_VERSION}
          cp initrd_modules/*.ko initrd_root/lib/modules/${KERNEL_VERSION}/ 2>/dev/null || true
          
          cp $(which busybox) initrd_root/bin/busybox
          
          cat << 'SCRIPT_EOF' > initrd_root/init
          #!/bin/busybox sh
          /bin/busybox --install -s /bin
          mount -t proc proc /proc
          mount -t sysfs sysfs /sys
          mount -t devtmpfs devtmpfs /dev 2>/dev/null || mdev -s
          
          # 选择性加载模块（文件不存在则跳过，不报错）
          KVER=$(uname -r)
          MODPATH=/lib/modules/$KVER
          for mod in nls_base nls_iso8859-1 nls_cp437 cdrom sr_mod isofs; do
              if [ -f "$MODPATH/$mod.ko" ]; then
                  insmod "$MODPATH/$mod.ko" 2>/dev/null
              fi
          done
          
          echo "===================================================="
          echo "      ImmortalWrt Unattended Automated Installer     "
          echo "===================================================="
          
          ISO_DEV=""
          ISO_MOUNT=""
          for dev in /dev/sr* /dev/sd* /dev/nvme*; do
              if [ -b "$dev" ]; then
                  mkdir -p /mnt_test
                  if mount -o ro "$dev" /mnt_test 2>/dev/null; then
                      if [ -f /mnt_test/openwrt.img ]; then
                          ISO_DEV="$dev"
                          ISO_MOUNT="/mnt_test"
                          echo "Found installation media: $ISO_DEV"
                          break
                      fi
                      umount /mnt_test
                  fi
              fi
          done
          
          if [ -z "$ISO_DEV" ]; then
              echo "ERROR: Installation source media (openwrt.img) not found!"
              exec sh
          fi
          
          # 计算安装介质对应的磁盘（用于排除）
          ISO_DISK=$(echo "$ISO_DEV" | sed -E 's/p?[0-9]+$//')
          
          TARGET_DISK=""
          for dev in /sys/block/*; do
              devname=$(basename $dev)
              case "$devname" in
                  sr*|loop*|ram*|dm-*) continue ;;
              esac
              
              if [ "/dev/$devname" = "$ISO_DISK" ]; then
                  continue
              fi
              
              size=$(cat "$dev/size")
              if [ "$size" -gt 0 ]; then
                  TARGET_DISK="/dev/$devname"
                  break
              fi
          done
          
          if [ -z "$TARGET_DISK" ]; then
              echo "ERROR: Destination disk not found!"
              exec sh
          fi
          
          echo "Target disk detected: $TARGET_DISK"
          echo "Writing image to $TARGET_DISK... Please wait..."
          
          # 直接从 ISO 挂载点流式写入目标磁盘，无需复制到内存
          dd if=${ISO_MOUNT}/openwrt.img of=$TARGET_DISK bs=4M
          sync
          
          echo "Success! System installation finished."
          echo "The machine will power off in 5 seconds. Please remove the USB drive."
          sleep 5
          poweroff -f
          SCRIPT_EOF
          
          chmod +x initrd_root/init
          
          cd initrd_root
          find . | cpio -H newc -o | gzip -9 > ../initrd.gz
          cd ..

      - name: Package Dual-Boot Unattended ISO
        run: |
          mkdir -p iso_root/boot/grub
          cp kernel.bin iso_root/kernel.bin
          cp initrd.gz iso_root/initrd.gz
          cp openwrt.img iso_root/openwrt.img
          
          cat << 'EOF' > iso_root/boot/grub/grub.cfg
          set default=0
          set timeout=1
          menuentry "ImmortalWrt Unattended Installer" {
              linux /kernel.bin quiet
              initrd /initrd.gz
          }
          EOF
          
          grub-mkrescue -o immortalwrt-24.10.6-x86-64-unattended.iso iso_root

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v24.10.6-build${{ github.run_number }}"
          name: "ImmortalWrt ISO v24.10.6 (Build #${{ github.run_number }})"
          body: |
            ### 🤖 自动化构建说明
            基于 **Image Builder** 原子化方案封装的物理机无人值守双启安装镜像。
            
            - **固件底包**：ImmortalWrt 24.10.6 (x86_64)
            - **根分区大小**：原生 512MB
            - **集成插件**：OpenClash, Dae, Daed, SQM
            - **源兼容修复**：已修正为通过验证的第三方插件归档拓扑源。
          files: immortalwrt-24.10.6-x86-64-unattended.iso
