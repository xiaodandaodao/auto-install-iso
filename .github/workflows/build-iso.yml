name: Build ImmortalWrt Unattended ISO via Image Builder

on:
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          # 在末尾补充了 genisoimage 和 syslinux，彻底满足官方底层生成 ISO 的环境要求
          sudo apt-get install -y zstd gawk gettext xz-utils xsltproc qemu-utils \
            grub-pc-bin grub-efi-amd64-bin xorriso mtools libisoburn1 busybox-static cpio \
            genisoimage syslinux
            
      - name: Download and Extract Image Builder
        run: |
          wget https://downloads.immortalwrt.org/releases/24.10.6/targets/x86/64/immortalwrt-imagebuilder-24.10.6-x86-64.Linux-x86_64.tar.zst
          tar -I zstd -xf immortalwrt-imagebuilder-24.10.6-x86-64.Linux-x86_64.tar.zst
          mv immortalwrt-imagebuilder-24.10.6-x86-64.Linux-x86_64 imagebuilder

      - name: Configure Image Builder (Feeds, Signature, PartSize, and Daede Automation)
        run: |
          cd imagebuilder
          
          # ==================== 【终极釜底抽薪】废掉所有虚拟机格式转换 ====================
          # 直接在 IB 内部的 host 目录提前塞入一个假的 qemu-img 脚本
          # 这样 Makefile 执行 qcow2/vhd/vmdk/vdi 转换时会直接调用这个假脚本，瞬间秒过且不报错
          mkdir -p staging_dir/host/bin
          echo -e '#!/bin/sh\necho "qemu-img bypassed!"' > staging_dir/host/bin/qemu-img
          chmod +x staging_dir/host/bin/qemu-img
          # ==============================================================================

          # 1. 屏蔽签名验证
          sed -i 's/option check_signature/# option check_signature/g' repositories.conf
          
          # 2. 注入第三方源
          echo "src/gz dllkids_packages https://down.dllkids.xyz/openwrt-feed/x86_64" >> repositories.conf
          
          # 3. 锁定 Rootfs 分区为 512MB
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=512" >> .config
          
          # 4. 【软件源提速】注释掉官方极其臃肿的 routing 和 telephony 源，大幅精简 opkg 索引时间
          sed -i '/_routing/s/^/#/' repositories.conf
          sed -i '/_telephony/s/^/#/' repositories.conf

          # 5. 【架构兼容修复】强行注入 x86_64 架构属性，彻底解决第三方源中特定包（如 luci-base）的架构不兼容报错
          echo "arch all 100" >> tmac_arch.conf
          echo "arch x86_64 200" >> tmac_arch.conf
          cat tmac_arch.conf >> repositories.conf
          rm tmac_arch.conf

          # 6. 创建 files 对应目录拓扑
          mkdir -p files/etc/uci-defaults

          # 7. 生成持久化网络检测与 daede 自动安装脚本
          cat << 'EOF' > files/etc/daede-autoplay.sh
          #!/bin/sh

          # 检查是否已经安装过（双重保险，如果检测到服务已存在，直接自毁）
          if [ -f "/etc/init.d/daede" ] || [ -f "/etc/init.d/daed" ]; then
              sed -i '/daede-autoplay.sh/d' /etc/crontabs/root
              rm -f "$0"
              exit 0
          fi

          # 检测网络：尝试 ping 镜像加速站，通了就继续，不通则退出等待下一分钟的 cron 触发
          if ! ping -c 1 -W 2 ghfast.top >/dev/null 2>&1; then
              exit 0
          fi

          # 走到这里说明网络通了，开始安装
          echo "网络已通，开始无人值守安装 daede..." | logger -t daede-init

          # 执行作者的一键脚本（用 yes "" 自动应对所有回车交互）
          yes "" | wget --no-check-certificate -O - https://ghfast.top/https://raw.githubusercontent.com/kenzok8/openwrt-daede/refs/heads/main/scripts/install.sh | ash 2>&1 | logger -t daede-init

          # 安装后兜底：确保使能并启动服务
          if [ -f "/etc/init.d/daede" ]; then
              /etc/init.d/daede enable
              /etc/init.d/daede start
          elif [ -f "/etc/init.d/daed" ]; then
              /etc/init.d/daed enable
              /etc/init.d/daed start
          fi

          # 安装完成，卸磨杀驴：从 cron 中移除自己，重启 cron 并彻底自毁脚本本体
          sed -i '/daede-autoplay.sh/d' /etc/crontabs/root
          /etc/init.d/cron restart
          rm -f "$0"

          echo "daede 安装完成，自动化脚本已自毁并解除定时任务。" | logger -t daede-init
          exit 0
          EOF

          # 8. 生成首次开机释放 cron 任务的 uci-defaults 触发器
          cat << 'EOF' > files/etc/uci-defaults/99-init-daede-cron
          #!/bin/sh
          # 向 crontabs 写入规则：每分钟执行一次检测脚本
          echo "* * * * * /etc/daede-autoplay.sh" >> /etc/crontabs/root

          # 启动并重启 cron 服务
          /etc/init.d/cron enable
          /etc/init.d/cron restart
          exit 0
          EOF

          # 9. 统一赋予宿主机打包环境下的可执行权限，确保随 rootfs 打包后权限正确
          chmod +x files/etc/daede-autoplay.sh
          chmod +x files/etc/uci-defaults/99-init-daede-cron
          
      - name: Build Firmware Image
        run: |
          cd imagebuilder
          
          # 显式补回 OpenClash 缺失的硬依赖（bash, curl, ruby, ruby-yaml, unzip 等）
          # 以及 SQM 缺失的底层组件，确保打包彻底通过
          make image PROFILE=generic -j$(nproc) \
            PACKAGES="luci-app-openclash sqm-scripts luci-app-sqm -dnsmasq -dnsmasq-dhcpv6 dnsmasq-full bash curl ca-bundle coreutils-nohup libcap-bin kmod-nft-tproxy ip-full ruby ruby-yaml unzip lm-sensors cgi-io" \
            CONFIG_TARGET_ROOTFS_PARTSIZE=512 \
            FILES=files
            
      - name: Extract Firmware and Kernel
        run: |
          IMAGE_PATH=$(ls imagebuilder/bin/targets/x86/64/*combined-efi.img.gz | head -n 1)
          echo "Target image found: $IMAGE_PATH"
          
          # 【核心修正】：用 || true 忽略 gunzip 针对分区填充数据产生的“假报错”(Exit Code 2)
          gunzip -c "$IMAGE_PATH" > openwrt.img || true
          
          # 增加一道防线：确保解压出来的固件文件存在，且体积不为 0
          if [ ! -s openwrt.img ]; then
            echo "Error: Firmware extraction failed!"
            exit 1
          fi
          echo "Firmware successfully extracted."
          
          if [ -f imagebuilder/bin/targets/x86/64/vmlinuz ]; then
            cp imagebuilder/bin/targets/x86/64/vmlinuz kernel.bin
          else
            cp imagebuilder/bin/targets/x86/64/*-generic-kernel.bin kernel.bin
          fi
          
      - name: Extract Kernel Modules from Firmware Image
        run: |
          sudo losetup -P /dev/loop0 openwrt.img
          sleep 1
          mkdir -p mnt
          # 挂载第二个分区（通常是 rootfs）
          sudo mount /dev/loop0p2 mnt
          KERNEL_VERSION=$(ls mnt/lib/modules/ | head -n 1)
          echo "KERNEL_VERSION=$KERNEL_VERSION" >> $GITHUB_ENV
          mkdir -p initrd_modules
          for mod in cdrom sr_mod isofs nls_base nls_iso8859-1 nls_cp437 ; do
            # 查找模块文件，可能是 .ko 或 .ko.gz
            file=$(sudo find mnt/lib/modules/$KERNEL_VERSION -name "${mod}.ko*" | head -n 1)
            if [ -n "$file" ]; then
              if echo "$file" | grep -q '\.ko\.gz$'; then
                sudo zcat "$file" > initrd_modules/${mod}.ko
              elif echo "$file" | grep -q '\.ko$'; then
                sudo cp "$file" initrd_modules/
              fi
            fi
          done
          sudo umount mnt
          sudo losetup -d /dev/loop0

      - name: Extract Kernel Modules from Firmware Image
        run: |
          sudo losetup -P /dev/loop0 openwrt.img
          sleep 1
          mkdir -p mnt
          sudo mount /dev/loop0p2 mnt
          KERNEL_VERSION=$(ls mnt/lib/modules/ | head -n 1)
          echo "KERNEL_VERSION=$KERNEL_VERSION" >> $GITHUB_ENV
          mkdir -p initrd_modules
          for mod in cdrom sr_mod isofs nls_base nls_iso8859-1 nls_cp437; do
            file=$(sudo find mnt/lib/modules/$KERNEL_VERSION -name "${mod}.ko*" | head -n 1)
            if [ -n "$file" ]; then
              if echo "$file" | grep -q '\.ko\.gz$'; then
                sudo zcat "$file" > initrd_modules/${mod}.ko
              elif echo "$file" | grep -q '\.ko$'; then
                sudo cp "$file" initrd_modules/
              fi
            fi
          done
          sudo umount mnt
          sudo losetup -d /dev/loop0    
          
      - name: Create Custom Initramfs (Installer)
        run: |
          mkdir -p initrd_root/bin initrd_root/sbin initrd_root/etc initrd_root/dev \
                   initrd_root/proc initrd_root/sys initrd_root/mnt initrd_root/mnt_test

          # 创建模块目录并复制提取的模块
          mkdir -p initrd_root/lib/modules/${KERNEL_VERSION}
          cp initrd_modules/*.ko initrd_root/lib/modules/${KERNEL_VERSION}/ 2>/dev/null || true

          cp $(which busybox) initrd_root/bin/busybox

          cat << 'SCRIPT_EOF' > initrd_root/init
          #!/bin/busybox sh
          RED='\033[31m'
          GREEN='\033[32m'
          YELLOW='\033[33m'
          CYAN='\033[36m'
          NC='\033[0m'

          /bin/busybox --install -s /bin
          mount -t proc proc /proc
          mount -t sysfs sysfs /sys
          mount -t devtmpfs devtmpfs /dev 2>/dev/null || mdev -s

          KVER=$(uname -r)
          MODPATH=/lib/modules/$KVER
          for mod in nls_base nls_iso8859-1 nls_cp437 cdrom sr_mod isofs; do
              [ -f "$MODPATH/$mod.ko" ] && insmod "$MODPATH/$mod.ko" 2>/dev/null
          done

          echo -e "${CYAN}====================================================${NC}"
          echo -e "${CYAN}      ImmortalWrt Unattended Automated Installer     ${NC}"
          echo -e "${CYAN}====================================================${NC}"

          echo -e "${YELLOW}[*] Searching for installation media...${NC}"
          ISO_DEV=""
          ISO_MOUNT=""
          for dev in /dev/sr* /dev/sd* /dev/nvme*; do
              if [ -b "$dev" ]; then
                  mkdir -p /mnt_test
                  if mount -o ro "$dev" /mnt_test 2>/dev/null; then
                      if [ -f /mnt_test/openwrt.img ]; then
                          ISO_DEV="$dev"
                          ISO_MOUNT="/mnt_test"
                          echo -e "${GREEN}[✓] Found: $ISO_DEV${NC}"
                          break
                      fi
                      umount /mnt_test
                  fi
              fi
          done

          if [ -z "$ISO_DEV" ]; then
              echo -e "${RED}[✗] ERROR: Installation source not found!${NC}"
              exec sh
          fi

          ISO_DISK=$(echo "$ISO_DEV" | sed -E 's/p?[0-9]+$//')

          echo -e "${YELLOW}[*] Scanning for target disk...${NC}"
          TARGET_DISK=""
          for dev in /sys/block/*; do
              devname=$(basename $dev)
              case "$devname" in
                  sr*|loop*|ram*|dm-*) continue ;;
              esac
              [ "/dev/$devname" = "$ISO_DISK" ] && continue
              size=$(cat "$dev/size")
              if [ "$size" -gt 0 ]; then
                  TARGET_DISK="/dev/$devname"
                  break
              fi
          done

          if [ -z "$TARGET_DISK" ]; then
              echo -e "${RED}[✗] ERROR: Destination disk not found!${NC}"
              exec sh
          fi

          echo -e "${GREEN}[✓] Target disk: $TARGET_DISK${NC}"
          echo -e "${YELLOW}[*] Writing image to $TARGET_DISK (please wait)...${NC}"

          dd if=${ISO_MOUNT}/openwrt.img of=$TARGET_DISK bs=4M &
          DD_PID=$!
          spin='-\|/'
          i=0
          while kill -0 $DD_PID 2>/dev/null; do
              i=$(( (i+1) % 4 ))
              printf "\r${GREEN}[%c]${NC} Flushing data to disk... " "${spin:$i:1}"
              sleep 0.5
          done
          wait $DD_PID
          printf "\r${GREEN}[✓]${NC} Data write completed.          \n"

          sync
          echo -e "${GREEN}========================================${NC}"
          echo -e "${GREEN}  Installation finished successfully!   ${NC}"
          echo -e "${GREEN}  System will power off in 5 seconds.   ${NC}"
          echo -e "${GREEN}  Please remove the installation media. ${NC}"
          echo -e "${GREEN}========================================${NC}"
          sleep 5
          poweroff -f
          SCRIPT_EOF

          chmod +x initrd_root/init

          cd initrd_root
          find . | cpio -H newc -o | gzip -9 > ../initrd.gz
          cd ..

      - name: Package Dual-Boot Unattended ISO
        run: |
          mkdir -p iso_root/boot/grub
          cp kernel.bin iso_root/kernel.bin
          cp initrd.gz iso_root/initrd.gz
          cp openwrt.img iso_root/openwrt.img
          
          cat << 'EOF' > iso_root/boot/grub/grub.cfg
          set default=0
          set timeout=1
          menuentry "ImmortalWrt Unattended Installer" {
              linux /kernel.bin quiet
              initrd /initrd.gz
          }
          EOF
          
          grub-mkrescue -o immortalwrt-24.10.6-x86-64-unattended.iso iso_root

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v24.10.6-build${{ github.run_number }}"
          name: "ImmortalWrt ISO v24.10.6 (Build #${{ github.run_number }})"
          body: |
            ### 🤖 自动化构建说明
            基于 **Image Builder** 原子化方案封装的物理机无人值守双启安装镜像。
            
            - **固件底包**：ImmortalWrt 24.10.6 (x86_64)
            - **根分区大小**：原生 512MB
            - **集成插件**：OpenClash, Dae, Daed, SQM
            - **源兼容修复**：已修正为通过验证的第三方插件归档拓扑源。
          files: immortalwrt-24.10.6-x86-64-unattended.iso
